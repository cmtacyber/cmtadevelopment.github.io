<svg width="100%" viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg" role="img">
<title>CMTA Development Logo</title>
<desc>CMTA Development cybersecurity company logo with shield and wordmark</desc>
<defs>
  <linearGradient id="shieldFill" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1c1c24"/>
    <stop offset="100%" style="stop-color:#0c0c0f"/>
  </linearGradient>
  <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#00c6ff"/>
    <stop offset="100%" style="stop-color:#0077b6"/>
  </linearGradient>
</defs>

<g transform="translate(10, 12)">
  <path d="M50 4 L96 22 L96 58 C96 85 75 103 50 112 C25 103 4 85 4 58 L4 22 Z"
    fill="url(#shieldFill)" stroke="#00c6ff" stroke-width="1.2"/>
  <path d="M50 14 L84 30 L84 58 C84 79 68 94 50 102 C32 94 16 79 16 58 L16 30 Z"
    fill="none" stroke="rgba(0,198,255,0.2)" stroke-width="0.8"/>
  <text x="50" y="74" font-family="Arial, sans-serif" font-weight="800" font-size="38" fill="url(#cyanGrad)" text-anchor="middle">C</text>
</g>

<g transform="translate(120, 30)">
  <text x="0" y="0" font-family="Arial, sans-serif" font-weight="800" font-size="40" fill="#ffffff" letter-spacing="3">CMTA</text>
  <text x="2" y="30" font-family="Arial, sans-serif" font-weight="300" font-size="15" fill="#7a8ba8" letter-spacing="6">DEVELOPMENT</text>
  <rect x="0" y="42" width="48" height="2" fill="#00c6ff" rx="1"/>
  <text x="0" y="65" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#4a5a72" letter-spacing="2">CYBERSECURITY RISK &amp; ADVISORY</text>
</g>
</svg>
